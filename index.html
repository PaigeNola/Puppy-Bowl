<!doctype html>
<html lang="en">
  <head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="stats">
        <p>Click a Puppy to see its stats!</p>
      </div>
      <div id="roster"></div>
      <form id="newPuppy">
        <input type="text" id="name" placeholder="Puppy Name" required />
        <input type="text" id="breed" placeholder="Breed" required />
        <button type="submit">Invite a New Puppy!</button>
      </form>
    </div>
  </body>
</html>
